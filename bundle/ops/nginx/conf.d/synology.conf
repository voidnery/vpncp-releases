# =============================================================================
# NET-Control — Synology nginx config (single-port edition).
#
# DSM already owns host ports 80/443, and Synology has no certbot, so unlike the
# VPS layout (80 redirect + 443 UI + 8443 agent), the Synology edition serves
# EVERYTHING on one TLS port (default 8443): UI, API, the SSH-console WebSocket,
# and the agent mTLS endpoint. `ssl_verify_client optional_no_ca` requests a
# client cert (agents present one; browsers don't) without ever rejecting the
# request — the API verifies the forwarded cert against the live CA in the DB.
#
# Cert at /etc/nginx/certs is self-signed on first boot by the `certinit` service.
# Replace it with a real cert (e.g. exported from DSM) for production; otherwise
# enroll agents with INSECURE_TLS=true.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    # Agents present a client cert; browsers do not. optional_no_ca asks for one
    # but never fails the handshake when it is absent or unknown to nginx.
    ssl_verify_client optional_no_ca;

    client_max_body_size 16M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Agent bootstrap (token-auth, no mTLS) -> agent API on 4001 ---
    location = /api/v1/agent/install.sh {
        set $u "api:4001"; proxy_pass http://$u; proxy_set_header Host $host;
    }
    location = /api/v1/agent/dist.tar.gz {
        set $u "api:4001"; proxy_pass http://$u; proxy_set_header Host $host;
    }
    location = /api/v1/agent/enroll {
        set $u "api:4001"; proxy_pass http://$u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Agent API: forward the TLS client cert for the API to verify ---
    location /api/v1/agent/ {
        set $u "api:4001"; proxy_pass http://$u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header overwrites any client-supplied value, so this cannot be
        # spoofed — only nginx's view of the real TLS client cert is forwarded.
        proxy_set_header X-Client-Cert $ssl_client_escaped_cert;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- SSH console WebSocket: must carry Upgrade/Connection, before /api/ ---
    location /api/v1/console {
        set $u "api:4000"; proxy_pass http://$u;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- UI API ---
    location /api/ {
        set $u "api:4000"; proxy_pass http://$u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /healthz {
        set $u "api:4000"; proxy_pass http://$u;
    }

    # --- SPA (served by the web container) ---
    location / {
        set $w "web:80"; proxy_pass http://$w;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
