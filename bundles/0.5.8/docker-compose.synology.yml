# =============================================================================
# NET-Control — Synology edition (Container Manager).
#
# Pulls version-pinned, pre-built images published by CI (release.yml) to GHCR.
# Designed for Synology DSM, which differs from a plain VPS:
#   - DSM already owns ports 80/443, so the panel uses ONE high TLS port (8443).
#   - No certbot. You provide the TLS cert: drop fullchain.pem + privkey.pem into
#     ./ops/synology/certs (bind-mounted into nginx). Populate it from DSM's
#     Let's Encrypt with ops/synology/sync-cert.sh, or by hand.
#   - No privileged auto-updater; you update from Container Manager (or SSH) with
#     a pull + recreate. The panel's "Обновления" page shows the exact command.
#
# Install / update:  see docs/SYNOLOGY.md
#   Pin version:   VPNCP_VERSION=v0.1.0   in .env   (default: stable)
#   Registry:      VPNCP_REGISTRY=ghcr.io/<owner>   in .env
#   Update:        docker compose -f docker-compose.synology.yml pull \
#                  && docker compose -f docker-compose.synology.yml up -d
# =============================================================================

networks:
  vpncp:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  ca_data:

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    networks: [vpncp]
    volumes:
      - mongo_data:/data/db
      - ./ops/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed to the host — reachable only on the internal network.

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks: [vpncp]
    command: ["redis-server", "--requirepass", "${REDIS_PASS}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${VPNCP_REGISTRY:-ghcr.io/voidnery}/vpncp-api:${VPNCP_VERSION:-stable}
    restart: unless-stopped
    networks: [vpncp]
    env_file: .env
    environment:
      # No privileged updater on DSM: the panel shows the exact manual command
      # instead. These make that command match THIS install (project folder +
      # compose file) rather than the VPS defaults.
      VPNCP_COMPOSE_DIR: ${VPNCP_COMPOSE_DIR:-/volume1/docker/netcontrol}
      VPNCP_COMPOSE_FILE: docker-compose.synology.yml
    volumes:
      - ca_data:/app/ca
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:4000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: ${VPNCP_REGISTRY:-ghcr.io/voidnery}/vpncp-web:${VPNCP_VERSION:-stable}
    restart: unless-stopped
    networks: [vpncp]
    depends_on: [api]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [vpncp]
    ports:
      # Single TLS port for UI + API + console WS + agent mTLS. Forward this port
      # on your router so remote agents can reach the panel.
      - "${PANEL_PORT:-8443}:8443"
    volumes:
      - ./ops/nginx/conf.d/synology.conf:/etc/nginx/conf.d/default.conf:ro
      # Operator-provided cert (bring-your-own). Drop fullchain.pem +
      # privkey.pem into ./ops/synology/certs BEFORE first start, or nginx won't boot.
      - ./ops/synology/certs:/etc/nginx/certs:ro
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_started }
